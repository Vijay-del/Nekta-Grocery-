[build]
  publish = "."

# ── ROUTING ─────────────────────────────────────────────────
# Let specific HTML files serve themselves
[[redirects]]
  from = "/rider"
  to   = "/rider.html"
  status = 200

[[redirects]]
  from = "/seller"
  to   = "/seller.html"
  status = 200

# SPA fallback — catch all unmatched routes
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── HEADERS ─────────────────────────────────────────────────

# HTML — NEVER cache (always fetch fresh from Netlify CDN)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Root index
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Service Workers — NEVER cache so updates apply immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript; charset=utf-8"

# Manifests — short cache so install prompt updates quickly
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest-rider.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest-seller.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS — short cache (5 min) so deploys go live fast
# DO NOT use immutable here — query strings don't bust Netlify CDN reliably
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    X-Content-Type-Options = "nosniff"

# CSS — same, 5 min
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Images — longer cache is fine, they rarely change
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Fonts
[[headers]]
  for = "/css/webfonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
